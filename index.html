<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SASAKI'S PORTFOLIO</title>
  <meta name="description" content="佐々木のポートフォリオです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" type="module"></script>
</head>

<body class="page page--top">
  <main class="page__main" role="main">

    <!-- ============================================================
         Block: letter-scene
         ============================================================ -->
    <div class="letter-scene">

      <!-- Element: hint（上部） -->
      <p class="letter-scene__hint" aria-live="polite">クリックして開封する</p>

      <!-- Block: letter-card -->
      <div class="letter-card"
           id="letterImg"
           role="button"
           tabindex="0"
           aria-label="手紙を開いてポートフォリオを見る">

        <img
          class="letter-card__image"
          src="images/letter.PNG"
          alt="封筒に入った手紙。クリックするとポートフォリオが開きます"
          aria-hidden="true"
        >

        <!-- Element: overlay text -->
        <div class="letter-card__body" aria-hidden="true">
          <p class="letter-card__name">Sasaki Uta</p>
          <p class="letter-card__role">Frontend Engineer Corse</p>
          <p class="letter-card__motto">— Slow and Steady —</p>
        </div>
      </div>

      <!-- Element: hint（下部） -->
      <p class="letter-scene__hint" aria-hidden="true">
        ✦ — open to read —
      </p>

    </div><!-- /.letter-scene -->

  </main>
</body>
</html>
